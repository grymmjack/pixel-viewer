name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # eframe/winit + native decoders (openssl) build/link deps. See CLAUDE.md.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libasound2-dev xvfb

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # The 161 tests are headless (egui_kittest drives the app via AccessKit with
      # no window); xvfb is a cheap safety net in case winit probes a display.
      - name: cargo test
        run: xvfb-run -a cargo test --locked

  screenshots:
    name: GUI screenshots (artifact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build deps + a software Vulkan stack: the loader (libvulkan1), Mesa
      # lavapipe (the CPU ICD egui_kittest's wgpu backend renders with), and
      # vulkan-tools for the diagnostic below. The loader auto-discovers the
      # lavapipe ICD from /usr/share/vulkan/icd.d — so we must NOT pin
      # VK_ICD_FILENAMES (a wrong path disables discovery) or WGPU_BACKEND
      # (kittest already prefers any CPU adapter, Vulkan or GL).
      - name: Install system dependencies + software Vulkan (lavapipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libasound2-dev xvfb \
            libvulkan1 mesa-vulkan-drivers vulkan-tools

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Diagnostic: prove a software adapter (lavapipe) is visible. Non-fatal.
      - name: Vulkan adapter info
        run: xvfb-run -a vulkaninfo --summary || true

      # Compile the screenshot test separately so a real build break still fails
      # the job (the render step below is deliberately best-effort).
      - name: Build screenshot renderer
        run: cargo test --locked --features gui-screenshots --no-run

      # Render the chrome screenshots into target/gui-screenshots/. Best-effort:
      # a software-GPU hiccup emits a warning but does NOT fail the job, so this
      # artifact job never red-Xes a PR. Artifacts appear when rendering works.
      - name: Render GUI screenshots
        env:
          RUST_BACKTRACE: "1"
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          xvfb-run -a cargo test --locked --features gui-screenshots gui_screenshots -- --nocapture \
            || echo "::warning::GUI screenshot render failed (non-fatal) — see log above"

      - name: List rendered screenshots
        run: ls -la target/gui-screenshots/ 2>/dev/null || echo "no screenshots produced"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-screenshots
          # The whole dir: the rendered PNGs + captions.md (per-shot action notes).
          path: target/gui-screenshots/
          if-no-files-found: warn
